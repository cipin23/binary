name: Build Flashable Zip A02 F2FS

on:
  workflow_dispatch:

jobs:
  build_zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Flashable Structure
        run: |
          mkdir -p zip_out/META-INF/com/google/android
          mkdir -p zip_out/system
          
          # Bikin update-binary yang maksa F2FS
          cat <<EOF > zip_out/META-INF/com/google/android/update-binary
          #!/sbin/sh
          # F2FS Force Installer for A02
          
          ui_print "--------------------------------------"
          ui_print "   LineageOS 18.1 F2FS - A02         "
          ui_print "--------------------------------------"
          
          # 1. Unmount total
          umount /system || true
          umount /dev/block/dm-0 || true
          
          # 2. Paksa Format ke F2FS (pake mkfs.f2fs kalo TWRP support)
          ui_print "- Formatting dm-0 to F2FS..."
          mkfs.f2fs -f /dev/block/dm-0 || mke2fs -t ext4 /dev/block/dm-0
          
          # 3. Mount dengan deteksi otomatis
          ui_print "- Mounting System..."
          mkdir -p /system
          mount /dev/block/dm-0 /system
          
          if [ \$? -eq 0 ]; then
              ui_print "- Mount Berhasil! Extracting ROM..."
              unzip -o "\$3" "system/*" -d /
              ui_print "- Extraction Done!"
          else
              ui_print "- ERROR: Gagal mount! Partisi masih ngunci."
              exit 1
          fi
          
          ui_print "- Done! Siap Reboot Brooooh!"
          exit 0
          EOF

          chmod 755 zip_out/META-INF/com/google/android/update-binary
          echo "ui_print(\"F2FS Bypass Active\");" > zip_out/META-INF/com/google/android/updater-script

      - name: Zip and Upload
        run: |
          cd zip_out && zip -r9 ../Lineage-F2FS-A02.zip .
